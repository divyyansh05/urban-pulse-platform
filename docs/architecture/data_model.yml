        type: STRING
        nullable: false
      - name: hour_of_day
        type: INTEGER
        nullable: false
      - name: day_of_week
        type: INTEGER
        nullable: false
      - name: is_weekend
        type: BOOLEAN
        nullable: false
      - name: month
        type: INTEGER
        nullable: false
      - name: temperature_c
        type: FLOAT64
        nullable: false
      - name: precipitation_mm
        type: FLOAT64
        nullable: false
      - name: wind_speed_kmh
        type: FLOAT64
        nullable: false
      - name: is_raining
        type: BOOLEAN
        nullable: false
      - name: aqi
        type: INTEGER
        nullable: false
      - name: aqi_category_encoded
        type: INTEGER
        description: "1=Good, 2=Moderate, 3=Unhealthy Sensitive, 4=Unhealthy+"
        nullable: false
      - name: nyc_complaints_last_1h
        type: INTEGER
        nullable: false
      - name: nyc_complaints_last_24h
        type: INTEGER
        nullable: false
      - name: london_lines_disrupted
        type: INTEGER
        nullable: false
      - name: label_complaints_next_1h
        type: INTEGER
        description: "Prediction target: complaints in next hour"
        nullable: true
      - name: label_aqi_next_6h
        type: INTEGER
        description: "Prediction target: AQI in 6 hours"
        nullable: true


# ══════════════════════════════════════════════════════════════════════════════
# LAYER 5: SNAPSHOTS (SCD Type 2)
# Track historical changes for slowly changing entities.
# ══════════════════════════════════════════════════════════════════════════════

  scd_311_complaint_status:
    description: >
      Full status history for every 311 complaint.
      Tracks every transition: Open → In Progress → Closed.
    strategy: timestamp
    updated_at: _ingestion_timestamp
    unique_key: source_unique_key
    columns:
      - source_unique_key
      - complaint_type
      - borough
      - status
      - resolution_description
      - dbt_scd_id        # added by dbt
      - dbt_updated_at    # added by dbt
      - dbt_valid_from    # added by dbt
      - dbt_valid_to      # added by dbt (NULL = current record)
      - dbt_is_deleted    # added by dbt

  scd_tfl_line_status:
    description: >
      Full status change history per TfL line.
      When did Victoria line go from Good Service to Minor Delays and back?
    strategy: timestamp
    updated_at: observed_at
    unique_key: line_id
    columns:
      - line_id
      - line_name
      - status_severity
      - status_description
      - is_disrupted
      - disruption_reason
      - dbt_scd_id
      - dbt_updated_at
      - dbt_valid_from
      - dbt_valid_to
      - dbt_is_deleted


# ══════════════════════════════════════════════════════════════════════════════
# SEED TABLES — Static reference data. CSV files in transformation/seeds/
# ══════════════════════════════════════════════════════════════════════════════

seeds:

  borough_zip_lookup:
    description: Maps NYC zip codes to borough names.
    file: transformation/seeds/borough_zip_lookup.csv
    columns: [zip_code, borough_name, neighborhood]

  tfl_severity_lookup:
    description: Maps TfL statusSeverity integer to human-readable description.
    file: transformation/seeds/tfl_severity_lookup.csv
    columns: [severity_code, severity_description, is_disrupted]

  wmo_weather_code_lookup:
    description: Maps WMO weather codes to descriptions and categories.
    file: transformation/seeds/wmo_weather_code_lookup.csv
    columns: [wmo_code, description, category, is_precipitation]

  nyc_community_board_lookup:
    description: Maps NYC community board numbers to neighborhoods and boroughs.
    file: transformation/seeds/nyc_community_board_lookup.csv
    columns: [community_board, borough, neighborhoods]

  complaint_type_sla:
    description: Expected resolution time (hours) per 311 complaint type.
    file: transformation/seeds/complaint_type_sla.csv
    columns: [complaint_type, sla_hours, priority_level]


# ══════════════════════════════════════════════════════════════════════════════
# MONITORING TABLES
# ══════════════════════════════════════════════════════════════════════════════

monitoring_tables:

  pipeline_run_log: "See raw._ingestion_log — mirrored here with enriched metadata"

  data_quality_results:
    description: Results of every Great Expectations checkpoint run.
    columns:
      - run_id, checkpoint_name, suite_name, table_name
      - run_time, success, evaluated_expectations
      - successful_expectations, unsuccessful_expectations
      - success_pct, failed_checks_detail

  sla_breach_log:
    description: Every pipeline SLA breach — used for alerting.
    columns:
      - breach_id, pipeline_name, expected_completion
      - actual_completion, breach_minutes, alerted_at

  schema_change_log:
    description: "See raw._schema_versions — enriched copy here"
