</g>

<!-- Arrows gold → serving -->
<line x1="160" y1="476" x2="120" y2="520" class="arr" marker-end="url(#arrow)"/>
<line x1="330" y1="476" x2="330" y2="520" class="arr" marker-end="url(#arrow)"/>
<line x1="500" y1="476" x2="540" y2="520" class="arr" marker-end="url(#arrow)"/>

<!-- Row label: serving -->
<text class="label" x="340" y="516" text-anchor="middle">serving</text>

<!-- Serving -->
<g class="c-purple">
  <rect x="20" y="524" width="188" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="114" y="542" text-anchor="middle" dominant-baseline="central">Tableau dashboards</text>
  <text class="ts" x="114" y="558" text-anchor="middle" dominant-baseline="central">city intelligence · BI</text>
</g>
<g class="c-purple">
