  <rect x="20" y="248" width="300" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="170" y="266" text-anchor="middle" dominant-baseline="central">AWS S3 — raw landing zone</text>
  <text class="ts" x="170" y="282" text-anchor="middle" dominant-baseline="central">nyc/ · london/ · _metadata/ · append-only</text>
</g>
<g class="c-amber">
  <rect x="332" y="248" width="332" height="44" rx="6" stroke-width="0.5"/>
