<line x1="176" y1="104" x2="176" y2="152" class="arr" marker-end="url(#arrow)"/>
<line x1="284" y1="104" x2="284" y2="152" class="arr" marker-end="url(#arrow)"/>
<line x1="392" y1="104" x2="392" y2="152" class="arr" marker-end="url(#arrow)"/>
<line x1="508" y1="104" x2="508" y2="152" class="arr" marker-end="url(#arrow)"/>

