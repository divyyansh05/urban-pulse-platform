<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; }
    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }

    /* c-blue */
    .c-blue rect  { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue .th   { fill: #0C447C; }
    .c-blue .ts   { fill: #185FA5; }

    /* c-teal */
    .c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th   { fill: #085041; }
    .c-teal .ts   { fill: #0F6E56; }

    /* c-amber */
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber .th  { fill: #633806; }
    .c-amber .ts  { fill: #854F0B; }

    /* c-gray */
    .c-gray rect  { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray .th   { fill: #444441; }
    .c-gray .ts   { fill: #5F5E5A; }

    /* c-green */
    .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green .th  { fill: #27500A; }
    .c-green .ts  { fill: #3B6D11; }

    /* c-purple */
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th  { fill: #3C3489; }
    .c-purple .ts  { fill: #534AB7; }

    .label { font-size: 11px; fill: #888780; }
  </style>
</defs>

<!-- Title -->
<text class="th" x="340" y="28" text-anchor="middle" style="font-size:15px;font-weight:500;fill:#1a1a1a;">Urban Pulse Platform — Cloud Architecture</text>

<!-- Row label: sources -->
<text class="label" x="340" y="52" text-anchor="middle">data sources</text>

<!-- Sources -->
<g class="c-blue">
  <rect x="20" y="60" width="96" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="68" y="78" text-anchor="middle" dominant-baseline="central">NYC 311</text>
  <text class="ts" x="68" y="94" text-anchor="middle" dominant-baseline="central">20.5M records</text>
</g>
<g class="c-blue">
  <rect x="128" y="60" width="96" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="176" y="78" text-anchor="middle" dominant-baseline="central">NYC Crime</text>
  <text class="ts" x="176" y="94" text-anchor="middle" dominant-baseline="central">9.5M records</text>
</g>
<g class="c-blue">
  <rect x="236" y="60" width="96" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="284" y="78" text-anchor="middle" dominant-baseline="central">TfL Transit</text>
  <text class="ts" x="284" y="94" text-anchor="middle" dominant-baseline="central">30s streaming</text>
</g>
<g class="c-blue">
  <rect x="344" y="60" width="96" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="392" y="78" text-anchor="middle" dominant-baseline="central">AirNow EPA</text>
  <text class="ts" x="392" y="94" text-anchor="middle" dominant-baseline="central">hourly batch</text>
</g>
<g class="c-blue">
  <rect x="452" y="60" width="112" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="508" y="78" text-anchor="middle" dominant-baseline="central">Open-Meteo</text>
  <text class="ts" x="508" y="94" text-anchor="middle" dominant-baseline="central">hourly, no key</text>
</g>

<!-- Arrows sources → ingestion -->
