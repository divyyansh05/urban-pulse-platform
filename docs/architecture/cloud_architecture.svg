<g class="c-gray">
  <rect x="20" y="340" width="300" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="170" y="358" text-anchor="middle" dominant-baseline="central">Databricks (Spark)</text>
  <text class="ts" x="170" y="374" text-anchor="middle" dominant-baseline="central">batch processing · backfill jobs</text>
</g>
<g class="c-gray">
  <rect x="332" y="340" width="332" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="498" y="358" text-anchor="middle" dominant-baseline="central">dbt on BigQuery</text>
  <text class="ts" x="498" y="374" text-anchor="middle" dominant-baseline="central">staging · intermediate · snapshots</text>
</g>

<!-- Arrows silver → gold -->
<line x1="170" y1="384" x2="170" y2="428" class="arr" marker-end="url(#arrow)"/>
<line x1="498" y1="384" x2="498" y2="428" class="arr" marker-end="url(#arrow)"/>

<!-- Row label: gold -->
<text class="label" x="340" y="424" text-anchor="middle">gold — marts layer</text>

