  <text class="ts" x="338" y="190" text-anchor="middle" dominant-baseline="central">streaming · 30s poll</text>
</g>
<g class="c-teal">
  <rect x="452" y="156" width="212" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="558" y="174" text-anchor="middle" dominant-baseline="central">Schema Registry</text>
  <text class="ts" x="558" y="190" text-anchor="middle" dominant-baseline="central">evolution detection · alerts</text>
</g>

<!-- Arrows ingestion → raw -->
<line x1="122" y1="200" x2="122" y2="244" class="arr" marker-end="url(#arrow)"/>
<line x1="338" y1="200" x2="338" y2="244" class="arr" marker-end="url(#arrow)"/>
<line x1="558" y1="200" x2="558" y2="244" class="arr" marker-end="url(#arrow)"/>

<!-- Row label: bronze -->
<text class="label" x="340" y="240" text-anchor="middle">bronze — raw layer</text>

<!-- Raw -->
